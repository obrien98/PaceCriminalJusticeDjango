{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Global CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'core/styles/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/styles/navbar.css' %}">


    {% block head %}
    {% endblock %}
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="{% static 'core/images/logo.jpeg' %}"><img src="{% static 'core/images/logo.jpeg' %}" alt=""></a>
            </div>

            <div class="nav-right" id="navRight">
              <div class="nav-socials">
                <a href="https://www.instagram.com/paceplv.cjs" aria-label="Instagram" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" aria-label="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>

                <a href="#" aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
              </div>

              <nav class="nav-links" id="navLinks">
                  <a href="#about">About</a>
                  <a href="#why-join">Why Join</a>
                  <a href="#career-paths">Career Paths</a>
                  <a href="#leadership">Leadership</a>
                  <a href="#events">Events</a>
                  <a href="#gallery">Gallery</a>
                  <a href="#join">Join</a>
              </nav>
            </div>


            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>
    </header>

    <!-- Main page content -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>&copy; {% now "Y" %} Criminal Justice. All rights reserved.</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
